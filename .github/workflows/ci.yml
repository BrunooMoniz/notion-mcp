name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Typecheck + build
        run: npm run build
      - name: Test
        # Unit tests run without a DB or API keys (DB/Voyage-dependent cases self-skip).
        run: npm test
